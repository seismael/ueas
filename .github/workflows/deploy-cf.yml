name: Deploy MCP to Cloudflare Workers
on:
  push:
    branches: [master]
    paths:
      - 'implementation/tools/ueas-mcp-cf/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: 'implementation/tools/ueas-mcp-cf'
          command: deploy src/index.js
