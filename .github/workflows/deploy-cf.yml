name: Deploy MCP to Cloudflare Workers
on:
  push:
    branches: [master]
    paths:
      - 'implementation/tools/ueas-mcp-cf/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: implementation/tools/ueas-mcp-cf } }
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
