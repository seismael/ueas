name: Fuzz

on:
  schedule:
    - cron: '0 2 * * 0'  # Weekly at 02:00 Sunday
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Fuzz batch
        run: cargo test --manifest-path kernel/Cargo.toml --test fuzz -- --ignored --test-threads=1
        timeout-minutes: 120
