steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/ueas-verify', '.']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/ueas-verify']
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args: ['run', 'deploy', 'ueas-verify',
         '--image', 'gcr.io/$PROJECT_ID/ueas-verify',
         '--region', 'us-central1',
         '--memory', '1Gi',
         '--cpu', '1',
         '--min-instances', '0',
         '--max-instances', '5',
         '--concurrency', '80',
         '--allow-unauthenticated',
         '--port', '8080']
timeout: 1800s
